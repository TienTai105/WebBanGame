version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: webbandb_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: webbandb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - webbandb_network

  mongo-express:
    image: mongo-express:latest
    container_name: webbandb_mongo_express
    environment:
      ME_CONFIG_MONGODB_ADMIN_USERNAME: admin
      ME_CONFIG_MONGODB_ADMIN_PASSWORD: password
      ME_CONFIG_MONGODB_URL: mongodb://admin:password@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
    networks:
      - webbandb_network

volumes:
  mongo_data:

networks:
  webbandb_network:
    driver: bridge
